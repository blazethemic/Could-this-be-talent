<!DOCTYPE html>
<html>
<head>
<title>Could This Be Talent?</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#000;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:0;
}

.hero img{
width:100%;
display:block;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#111;
padding:25px;
border-radius:15px;
margin-bottom:25px;
}

h1,h2{
text-align:center;
}

.pay-btn{
display:block;
background:#ff4d00;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
border-radius:12px;
text-decoration:none;
}

input,select,textarea{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:15px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:18px;
background:#ff4d00;
color:white;
font-size:20px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="hero">

<img src="A34246D8-CA50-407E-A152-A0364CBF8C58.png">
</div>

<div class="container">

<div class="card">

<h2>Think You Got Talent?</h2>

<p>
Can you sing, rap, dance, tell jokes, do impressions,
magic tricks, stunts, or anything entertaining?
</p>

<p>
Make us laugh. Amaze us. Shock us.
Show us what you've got.
</p>

</div>

<div class="card">

<h2>Entry Fee: $50</h2>

<a class="pay-btn"
href="https://buy.stripe.com/6oUbJ3alFgz24FH8N8afS01">

🎤 Pay $50 & Submit Entry

</a>

</div>

<div class="card">

<h2>Contestant Application</h2>

<form action="https://formspree.io/f/mkoazrze" method="POST">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone">

<label>Talent Type</label>

<select name="talent">

<option>Singer</option>
<option>Rapper</option>
<option>Dancer</option>
<option>Comedian</option>
<option>Magician</option>
<option>Actor</option>
<option>Other</option>

</select>

<label>Instagram</label>
<input type="text" name="instagram">

<label>Tell Us About Your Talent</label>

<textarea name="message"></textarea>

<button type="submit">

Submit Application

</button>

</form>

</div>

</div>

</body>
</html>
