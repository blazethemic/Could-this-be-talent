<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Could This Be Talent?</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
color:white;
}

.hero img{
width:100%;
display:block;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
background:#111;
padding:25px;
margin-bottom:25px;
border-radius:15px;
}

h1,h2{
text-align:center;
}

p{
font-size:20px;
line-height:1.6;
}

.pay-btn{
text-align:center;
}

.pay-btn a{

color:white;
padding:20px 35px;
font-size:28px;
font-weight:bold;
text-decoration:none;
border-radius:12px;
display:inline-block;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:18px;
}

button{
width:100%;
padding:18px;
background:#ff4d00;
color:white;
border:none;

margin-top:20px;
}
</style>

<body>

<div class="hero">
<img src="talent-poster.jpg" alt="Could This Be Talent">
</div>

<div class="container">

<div class="section">

<h2>Think You Got Talent?</h2>

<p>
Can you sing, rap, dance, tell jokes, do impressions,
magic tricks, stunts, or anything entertaining?
</p>

<p>
Make us laugh. Amaze us. Shock us.
Show us what you've got.
</p>

</div>

<div class="section">

<h2>Entry Fee: $50</h2>

<div class="pay-btn">

<a href="https://buy.stripe.com/6oUbJ3alFgz24FH8N8afS01">
🎤 Pay $50 & Submit Entry
</a>

</div>

</div>

<div class="section">

<h2>Contestant Application</h2>

<form action="https://formspree.io/f/mkoazrze" method="POST">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone">

<label>Talent Type</label>
<select name="talent">
<option>Singer</option>
<option>Rapper</option>
<option>Dancer</option>
<option>Comedian</option>
<option>Magician</option>
<option>Impersonator</option>
<option>Actor</option>
<option>Other</option>
</select>

<label>Instagram / Social Media</label>
<input type="text" name="social">

<label>Tell Us About Your Talent</label>
<textarea name="message" rows="5"></textarea>

<button type="submit">
Submit Application
</button>

</form>

</div>

</div>

</body>
</html>
